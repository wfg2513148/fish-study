<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>学习要点与练习</title>
  <style>
    @page { size: A4; margin: 14mm; }
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; color: #111; }
    h1 { font-size: 22px; margin: 0 0 10px; }
    h2 { font-size: 16px; margin: 16px 0 8px; border-bottom: 1px solid #222; padding-bottom: 4px; }
    p, li { font-size: 12.5px; line-height: 1.55; }
    .meta { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 10px 0 14px; }
    .box { border: 1px solid #333; min-height: 28px; padding: 5px 7px; font-size: 12px; }
    .task { border: 1px solid #999; padding: 8px; margin: 8px 0; break-inside: avoid; }
    .lines { height: 68px; background: repeating-linear-gradient(#fff, #fff 23px, #ddd 24px); border: 1px solid #ddd; }
  </style>
</head>
<body>
  <h1>学习要点与练习</h1>
  <section class="meta">
    <div class="box">日期：</div>
    <div class="box">学科：</div>
    <div class="box">章节：</div>
    <div class="box">用时：</div>
  </section>
  <h2>做题前先确认</h2>
  <ul>
    <li>知识点 1：</li>
    <li>知识点 2：</li>
    <li>知识点 3：</li>
  </ul>
  <h2>热身题</h2>
  <div class="task">1.</div>
  <div class="task">2.</div>
  <h2>正式练习</h2>
  <div class="task">1.<div class="lines"></div></div>
  <div class="task">2.<div class="lines"></div></div>
  <h2>自我检查</h2>
  <ul>
    <li>我能说出这题考的知识点。</li>
    <li>我检查了题目条件、单位、符号和计算过程。</li>
    <li>我标出了还不确定的地方。</li>
  </ul>
</body>
</html>
